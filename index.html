<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Process Automation</title>
    
    <link rel="icon" type="image/png" href="assets/logo-blanco-ball.png">
    

<link rel="stylesheet" href="css/style.css?v=12">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-header">
        <div class="page-header">
            <img src="https://bold-process-automation.github.io/assets-project-graphic-design/bold-logo-palabra-blanco.png" alt="Logo Bold">
            <h1>Roadmap Process Automation</h1>
        </div>
    </header>

    <div class="main-container">
        
       <div class="controls-header">
            
            <div class="left-controls">
                
                <div class="tabs-container" style="display: flex; flex-direction: column; gap: 8px;">
                    <div class="tabs">
                        <button class="tab active" id="tab-appian" onclick="switchMainTab('appian')">Appian</button>
                        <button class="tab" id="tab-automation" onclick="switchMainTab('automation')">Automation IA</button>
                    </div>
                    
                    <div class="sub-tabs" id="sub-tabs-automation" style="display: none;">
                        <button class="sub-tab active" id="sub-tab-automation-ia" onclick="switchSubTab('automation ia')">Roadmap IA</button>
                        <button class="sub-tab" id="sub-tab-wsnh" onclick="switchSubTab('wsnh')">Campaña WSNH</button>
                    </div>
                </div>

                <div class="status-legend">
                    <span class="sl-title">Estados:</span>
                    <div class="sl-item"><img src="assets/dev.png" class="sl-icon"> Dev</div>
                    <div class="sl-item"><img src="assets/test.png" class="sl-icon"> Test</div>
                    <div class="sl-item"><img src="assets/piloto1.png" class="sl-icon sl-piloto"> Piloto</div>
                    <div class="sl-item"><img src="assets/prod.png" class="sl-icon"> Prod</div>
                </div>

            </div>

            <div class="right-controls">
                
                <div class="custom-filter" id="customFilter">
                    <div class="filter-btn" onclick="toggleFilterMenu()">
                        <span id="filterBtnText">Áreas y Filtros</span>
                    </div>
                    
                    <div class="filter-panel" id="filterPanel">
                        <div class="fp-header">
                            <span class="fp-title">Filtrar por Área</span>
                            <span class="fp-clear" onclick="clearFilter()">Limpiar</span>
                        </div>
                        <div class="fp-search-box">
                            <input type="text" id="filterSearch" placeholder="Buscar área..." onkeyup="searchFilter()">
                        </div>
                        <div class="fp-select-all">
                            <label>
                                <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)">
                                <span style="font-weight: 700; color: #555;">Seleccionar Todas</span>
                            </label>
                        </div>
                        <div class="fp-list" id="filterOptionsContainer">
                            </div>
                        <div class="fp-actions">
                            <button class="fp-btn-cancel" onclick="closeFilterMenu()">Cancelar</button>
                            <button class="fp-btn-ok" onclick="applyFilter()">Aplicar Filtro</button>
                        </div>
                    </div>
                </div>

                <div class="view-toggle" id="toggleContainer">
                    <span id="label-semanas">Semanas</span>
                    <label class="switch">
                        <input type="checkbox" id="viewToggle" onchange="toggleViewMode()">
                        <span class="slider"></span>
                    </label>
                    <span id="label-meses">Meses</span>
                </div>

            </div>
        </div>

        <div class="timeline-wrapper">
            <div class="timeline-scroll-area" id="mainScrollArea">
                <div class="quarters-header" id="quarters-header"></div>
                <div class="months-header" id="months-header"></div>
                <div class="weeks-header" id="weeks-header"></div>
                <div class="grid-lines" id="grid-lines"></div>
                <div class="projects-area" id="projects-container"></div>
                <div id="today-marker" class="today-line" style="display: none;">
                    <div class="today-label">Hoy</div>
                </div>
            </div>
        </div>
    </div> 

    <div id="sync-toast" class="sync-toast"></div>

    <script src="js/app.js"></script>

</body>
</html>
