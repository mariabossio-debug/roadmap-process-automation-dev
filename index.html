<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold Roadmap Process Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

    <header class="top-header">
        <div class="page-header">
            <img src="assets/logo-blanco-ball.png" alt="Bold Logo">
            <h1>Roadmap Process Automation</h1>
        </div>
    </header>

    <main class="main-container">
        
        <div class="controls-header">
            
            <div class="left-controls">
                
                <div class="tabs-container">
                    <button class="tab active" id="tab-appian" onclick="switchTab('appian')">Appian</button>
                    <button class="tab" id="tab-automation" onclick="switchTab('automation')">Automation IA</button>
                </div>

                <div class="status-legend">
                    <span class="sl-title">Estados:</span>
                    <div class="sl-item"><img src="assets/dev.png" class="sl-icon"> Dev</div>
                    <div class="sl-item"><img src="assets/test.png" class="sl-icon"> Test</div>
                    <div class="sl-item"><img src="assets/piloto1.png" class="sl-icon sl-piloto"> Piloto</div>
                    <div class="sl-item"><img src="assets/prod.png" class="sl-icon"> Prod</div>
                </div>

            </div>

            <div class="right-controls">
                
                <div class="custom-filter" id="customFilter">
                    <div class="filter-btn" onclick="toggleFilterMenu()">
                        <span id="filterBtnText">Áreas y Filtros</span>
                    </div>
                    
                    <div class="filter-panel" id="filterPanel">
                        <div class="fp-header">
                            <span class="fp-title">Filtrar por Área</span>
                            <span class="fp-clear" onclick="clearFilter()">Limpiar</span>
                        </div>
                        <div class="fp-search-box">
                            <input type="text" id="filterSearch" placeholder="Buscar área..." onkeyup="searchFilter()">
                        </div>
                        <div class="fp-select-all">
                            <label>
                                <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)">
                                <span style="font-weight: 700; color: #555;">Seleccionar Todas</span>
                            </label>
                        </div>
                        <div class="fp-list" id="filterOptionsContainer">
                            </div>
                        <div class="fp-actions">
                            <button class="fp-btn-cancel" onclick="closeFilterMenu()">Cancelar</button>
                            <button class="fp-btn-ok" onclick="applyFilter()">Aplicar Filtro</button>
                        </div>
                    </div>
                </div>

                <div class="view-toggle" id="toggleContainer">
                    <span id="label-semanas">Semanas</span>
                    <label class="switch">
                        <input type="checkbox" id="viewToggle" onchange="toggleViewMode()">
                        <span class="slider"></span>
                    </label>
                    <span id="label-meses">Meses</span>
                </div>

            </div>
        </div>

        <div class="timeline-wrapper">
            <div class="timeline-scroll-area" id="mainScrollArea">
                
                <div class="quarters-header" id="quarters-header">
                    </div>

                <div class="months-header" id="months-header">
                    </div>

                <div class="weeks-header" id="weeks-header">
                    </div>

                <div class="grid-lines" id="grid-lines">
                    </div>

                <div class="projects-area" id="projects-container">
                    </div>

                <div class="today-line" id="today-marker">
                    <span class="today-label">HOY</span>
                </div>
            </div>
        </div>

        <div class="sync-toast" id="sync-toast">
            <div class="spinner-small"></div>
            Sincronizando Sheets...
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
